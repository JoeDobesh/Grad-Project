<!DOCTYPE html>
<!-- This is my Grad Project Track Loop Control Page -->
<html lang="en-US">
	<head>
		<meta charset="utf-8" />
		<meta name="description" content="Crossover Switch Control" />
		<meta name="author" content="Joe Dobesh" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Crossover Switch Control</title>
		<style>
			body {background-color:blue;}
			h1 {text-align:center;}
			table, th, td {
				border: 1px solid black;
				border-style: inset;
			}
			th, td {
				background-color: white;
			}
			table.center {
				margin-left: auto; 
				margin-right: auto;
			}
			.green {
				background-image: -webkit-linear-gradient(top, #13fB04 0%, #58e343 50%, #ADED99 100%);
			}
			.orange {
				background-image: -webkit-linear-gradient(top, #f9a004 0%, #e0ac45 50%, #ead698 100%);
			}
			.red {
				background-image: -webkit-linear-gradient(top, #fb1304 0%, #e35843 50%, #edad99 100%);
			}
			.led {
				border-radius: 5px;
				width: 10px;
				height: 10px;
				box-shadow: 0px 0px 3px black;
				margin: 5px;
				zoom: 5;
			}
			.led:after {
				display: block;
				content: '';
				margin-left: 1px;
				margin-right: 1px;
				width: 8px;
				height: 8px;
				-webkit-border-top-right-radius: 4px 3px;
				-webkit-border-top-left-radius: 4px 3px;
				-webkit-border-bottom-right-radius: 4px 3px;
				-webkit-border-bottom-left-radius: 4px 3px;
				background-image: -webkit-linear-gradient(top, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0.2) 100%);
			}
		</style>
		<script>
			function OpenSwitch()
			{
				document.getElementById("led_display").classList = "orange led";
				document.getElementById("retVal").value = "open";
			}
			function CloseSwitch()
			{
				document.getElementById("led_display").classList = "orange led";
				document.getElementById("retVal").value = "close";
			}
		</script>
	</head>
	<body>
		<h1>Crossover Switch Control</h1>
		<hr />
		<p style="text-align:center;">
			<button onclick="document.location='index.html'">Return To Main Page</button>
			<button onclick="document.location='SpeedControl.shtml'">Speed Control Page</button>
			<button onclick="document.location='CrossingMonitor.shtml'">Crossing Monitor Page</button>
		</p>
		<p style="text-align:center;">This Page Controls the Crossover Switch</p>
		<hr />
		<form action="switch.cgi">
			<table class="center">
				<tr style="text-align:center;">
					<td><button type="submit" value='submit' onclick="OpenSwitch()">Open</button></td>
					<td><div id="led_display" class="<!--#crossoverSwitch-->"></div></td>
					<td><button type="submit" value='submit' onclick="CloseSwitch()">Close</button></td>
				</tr>
			</table>
			<td><input type="hidden" id="retVal" name="retVal" style="width:50px"></td>
		</form>
		<p style="text-align:center;">
			<button onclick="document.location='CrossoverSwitchControl.shtml'">Refresh</button>
		</p>
		<p style="text-align:center;">
			<a href="index.html", style="color:red;">Exit</a>
		</p>
	</body>
</html>
